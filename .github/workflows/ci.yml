name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: skills/dotnet-minimal-api/template/global.json

      - name: Restore
        run: dotnet restore
        working-directory: skills/dotnet-minimal-api/template

      - name: Build
        run: dotnet build --no-restore --configuration Release
        working-directory: skills/dotnet-minimal-api/template

      - name: Test
        run: dotnet test --no-build --configuration Release
        working-directory: skills/dotnet-minimal-api/template

      - name: Coverage summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: skills/dotnet-minimal-api/template/tests/MyMinimalWebApp.Api.IntegrationTests/**/coverage.cobertura.xml
          badge: true
          fail_below_min: true
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: both
          thresholds: "80 90"

      - name: Post coverage comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: code-coverage-results.md

  stamp-commit-hash:
    name: Stamp Commit Hash
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Replace commit hash token in SKILL.md
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          sed -i 's/commit: ".*"/commit: "${{ github.sha }}"/g' skills/dotnet-minimal-api/SKILL.md
          sed -i "s/last-updated: \".*\"/last-updated: \"${TIMESTAMP}\"/g" skills/dotnet-minimal-api/SKILL.md

      - name: Commit stamped SKILL.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills/dotnet-minimal-api/SKILL.md
          git diff --cached --quiet || git commit -m "chore: stamp commit hash in SKILL.md [skip ci]"
          git push

