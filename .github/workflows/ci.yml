name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: dotnet-minimal-api/template/global.json

      - name: Restore
        run: dotnet restore
        working-directory: dotnet-minimal-api/template

      - name: Build
        run: dotnet build --no-restore --configuration Release
        working-directory: dotnet-minimal-api/template

      - name: Test
        run: dotnet test --no-build --configuration Release
        working-directory: dotnet-minimal-api/template

      - name: Coverage summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: dotnet-minimal-api/template/tests/MyMinimalWebApp.Api.IntegrationTests/**/coverage.cobertura.xml
          badge: true
          fail_below_min: true
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: both
          thresholds: "80 90"

      - name: Post coverage comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: code-coverage-results.md
